# Nèrvi Helm values.
#
# Install into namespace `nervi` with release name `nervi` so the NATS service
# DNS (nervi-nats.nervi.svc.cluster.local) matches the MCP default:
#   helm install nervi ./helm/nervi -n nervi --create-namespace

imagePullSecrets:
  - name: ghcr-creds

# ---------------------------------------------------------------------------
# OCCITAN JetStream stream — provisioned idempotently by a post-install hook.
# ---------------------------------------------------------------------------
stream:
  name: OCCITAN
  subjects:
    - "occitan.>"
  storage: file
  retention: limits
  discard: old
  replicas: 1
  maxBytes: 1073741824 # 1 GiB
  maxAgeSeconds: 604800 # 7 days
  duplicateWindowSeconds: 120 # 2 minutes
  # nats-box image used to run the natscli provisioning job.
  provisionImage: natsio/nats-box:0.18.0

# ---------------------------------------------------------------------------
# Nèrvi MCP server (nervi_publish / nervi_subscribe) — ClusterIP only.
# ---------------------------------------------------------------------------
mcp:
  enabled: true
  replicas: 1
  image:
    repository: ghcr.io/miegjorn/nervi-mcp
    tag: latest
    pullPolicy: Always
  port: 8080
  # Leave empty to derive nats://nervi-nats.<release-namespace>.svc.cluster.local:4222
  natsUrl: ""
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

# ---------------------------------------------------------------------------
# SRE log watcher (N-5) — the first sensor (Epic 2). Streams pod logs and feeds
# the classification stage (N-6). Read-only RBAC: get/list/watch pods + pods/log.
# Disabled by default — opt in once a classification consumer (N-6) is in place,
# since until then it only emits log lines as NDJSON to its own stdout.
# ---------------------------------------------------------------------------
watcher:
  enabled: false
  replicas: 1
  image:
    repository: ghcr.io/miegjorn/sre-watcher
    tag: latest
    pullPolicy: Always
  # Pod selection. All-empty means cluster-wide, every container.
  namespaces: [] # list of namespaces to watch; empty = all namespaces
  labelSelector: "" # k8s label selector, e.g. "app=api"
  container: "" # restrict to a single container name; empty = all containers
  # Log-tracking tunables (map to WATCH_* env vars).
  sinceSeconds: 10 # lookback when first attaching to a pod (no resume cursor yet)
  pollIntervalMs: 15000 # how often to re-list pods to pick up new / rotated pods
  reconnectBackoffMs: 1000 # base backoff after a log stream ends/errors
  maxReconnectBackoffMs: 30000 # cap on the reconnect backoff
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

# ---------------------------------------------------------------------------
# NATS subchart. JetStream on file storage, ClusterIP only.
# ---------------------------------------------------------------------------
nats:
  # Pin the service name so the MCP default URL resolves regardless of release name.
  fullnameOverride: nervi-nats
  config:
    cluster:
      enabled: false
    jetstream:
      enabled: true
      fileStore:
        enabled: true
        pvc:
          enabled: true
          size: 1Gi
      memoryStore:
        enabled: false
  # ClusterIP (default). Only the core 4222 client port is needed intra-cluster.
  service:
    enabled: true
    ports:
      nats:
        enabled: true
      leafnodes:
        enabled: false
      websocket:
        enabled: false
      mqtt:
        enabled: false
      cluster:
        enabled: false
      gateway:
        enabled: false
      monitor:
        enabled: false
      profiling:
        enabled: false
  # nats-box ships disabled — we run our own provisioning job instead.
  natsBox:
    enabled: false
