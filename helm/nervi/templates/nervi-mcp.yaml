{{- if .Values.mcp.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nervi-mcp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nervi.labels" . | nindent 4 }}
    {{- include "nervi.selectorLabels" (dict "component" "nervi-mcp" "context" .) | nindent 4 }}
spec:
  replicas: {{ .Values.mcp.replicas }}
  selector:
    matchLabels:
      {{- include "nervi.selectorLabels" (dict "component" "nervi-mcp" "context" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nervi.selectorLabels" (dict "component" "nervi-mcp" "context" .) | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: nervi-mcp
          image: "{{ .Values.mcp.image.repository }}:{{ .Values.mcp.image.tag }}"
          imagePullPolicy: {{ .Values.mcp.image.pullPolicy }}
          ports:
            - name: mcp
              containerPort: {{ .Values.mcp.port }}
              protocol: TCP
          env:
            - name: NERVI_MCP_TRANSPORT
              value: "http"
            - name: PORT
              value: {{ .Values.mcp.port | quote }}
            - name: NATS_URL
              value: {{ include "nervi.natsUrl" . | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: mcp
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: mcp
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.mcp.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: nervi-mcp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nervi.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "nervi.selectorLabels" (dict "component" "nervi-mcp" "context" .) | nindent 4 }}
  ports:
    - name: mcp
      port: {{ .Values.mcp.port }}
      targetPort: mcp
{{- end }}
