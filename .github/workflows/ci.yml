name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  nervi-core:
    name: nervi-core (Rust clippy + integration test on real NATS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start NATS JetStream
        # Service containers can't pass the `-js` flag, so run the broker
        # directly. This is the SAME real NATS the in-cluster fabric uses —
        # the N-4 integration test exercises it end to end, no mocks.
        run: |
          docker run -d --name nats -p 4222:4222 nats:2.10-alpine -js
          for i in $(seq 1 30); do
            if (exec 3<>/dev/tcp/127.0.0.1/4222) 2>/dev/null; then
              echo "NATS JetStream is ready"; exit 0
            fi
            echo "waiting for NATS..."; sleep 1
          done
          echo "NATS did not become ready"; docker logs nats; exit 1
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (warnings are errors)
        run: cargo clippy --all-targets -- -D warnings
      - name: Test (unit + N-4 integration against real NATS)
        run: cargo test --workspace
        env:
          NERVI_TEST_NATS_URL: nats://127.0.0.1:4222

  mcp:
    name: MCP server (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp/nervi-mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mcp/nervi-mcp/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  integration:
    name: N-4 integration test (SRE sensor → ops.sre.alerts → consumer)
    runs-on: ubuntu-latest
    needs: [mcp]
    defaults:
      run:
        working-directory: mcp/nervi-mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mcp/nervi-mcp/package-lock.json
      - run: npm ci
      - name: Start NATS with JetStream
        run: docker run -d --name nats-js -p 4222:4222 nats:2.10-alpine -js
      - name: Wait for NATS JetStream to be ready
        run: |
          for i in $(seq 1 20); do
            if nc -z localhost 4222; then
              echo "NATS JetStream is up on :4222"
              break
            fi
            echo "Waiting for NATS... ($i/20)"
            sleep 1
          done
      - name: Run integration tests
        env:
          NATS_URL: nats://localhost:4222
        run: npm run test:integration

  watcher:
    name: SRE watcher (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sensors/sre-watcher
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sensors/sre-watcher/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  helm:
    name: Helm chart (deps, lint, template)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.3
      - name: Add NATS Helm repo
        run: helm repo add nats https://nats-io.github.io/k8s/helm/charts/ && helm repo update
      - name: Build chart dependencies
        run: helm dependency build helm/nervi
      - name: Lint
        run: helm lint helm/nervi
      - name: Render (template)
        run: helm template nervi helm/nervi -n nervi > /dev/null
      - name: Render with the SRE watcher enabled
        run: helm template nervi helm/nervi -n nervi --set watcher.enabled=true > /dev/null

  docker:
    name: Build & push nervi-mcp image
    runs-on: ubuntu-latest
    needs: [mcp]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/miegjorn/nervi-mcp
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
      - uses: docker/build-push-action@v5
        with:
          context: mcp/nervi-mcp
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ github.workflow }}
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}

  docker-watcher:
    name: Build & push sre-watcher image
    runs-on: ubuntu-latest
    needs: [watcher]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/miegjorn/sre-watcher
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
      - uses: docker/build-push-action@v5
        with:
          context: sensors/sre-watcher
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ github.workflow }}-watcher
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}-watcher
