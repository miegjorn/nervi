name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  mcp:
    name: MCP server (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp/nervi-mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mcp/nervi-mcp/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  integration:
    name: N-4 integration test (SRE sensor → ops.sre.alerts → consumer)
    runs-on: ubuntu-latest
    needs: [mcp]
    defaults:
      run:
        working-directory: mcp/nervi-mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mcp/nervi-mcp/package-lock.json
      - run: npm ci
      - name: Start NATS with JetStream
        run: docker run -d --name nats-js -p 4222:4222 nats:2.10-alpine -js
      - name: Wait for NATS JetStream to be ready
        run: |
          for i in $(seq 1 20); do
            if nc -z localhost 4222; then
              echo "NATS JetStream is up on :4222"
              break
            fi
            echo "Waiting for NATS... ($i/20)"
            sleep 1
          done
      - name: Run integration tests
        env:
          NATS_URL: nats://localhost:4222
        run: npm run test:integration

  helm:
    name: Helm chart (deps, lint, template)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.3
      - name: Add NATS Helm repo
        run: helm repo add nats https://nats-io.github.io/k8s/helm/charts/ && helm repo update
      - name: Build chart dependencies
        run: helm dependency build helm/nervi
      - name: Lint
        run: helm lint helm/nervi
      - name: Render (template)
        run: helm template nervi helm/nervi -n nervi > /dev/null

  docker:
    name: Build & push nervi-mcp image
    runs-on: ubuntu-latest
    needs: [mcp]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/miegjorn/nervi-mcp
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
      - uses: docker/build-push-action@v5
        with:
          context: mcp/nervi-mcp
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ github.workflow }}
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}
