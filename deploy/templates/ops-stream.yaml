# Creates the durable "ops" JetStream stream after NATS is ready.
# Subject ops.> captures all ops signals including ops.sre.alerts.
# Retention: up to 10 000 messages or 24 hours, whichever comes first.
# Storage: file — survives pod restarts.
apiVersion: v1
kind: ConfigMap
metadata:
  name: nervi-ops-stream-config
  namespace: occitan-system
  labels:
    app.kubernetes.io/name: nervi
    app.kubernetes.io/component: stream-config
data:
  # This ConfigMap documents the stream config applied by the init Job below.
  # The Job runs nats stream add via the NATS CLI so the stream is idempotent.
  stream.json: |
    {
      "name": "OPS",
      "subjects": ["ops.>"],
      "storage": "file",
      "retention": "limits",
      "max_msgs": 10000,
      "max_age": 86400000000000,
      "max_bytes": -1,
      "num_replicas": 1,
      "discard": "old"
    }
---
# One-shot Job that creates the OPS stream on first deploy (idempotent).
# Runs after NATS is ready; safe to re-run if the stream already exists.
apiVersion: batch/v1
kind: Job
metadata:
  name: nervi-create-ops-stream
  namespace: occitan-system
  labels:
    app.kubernetes.io/name: nervi
    app.kubernetes.io/component: stream-init
  annotations:
    # Helm hook: run once on install and upgrade, after resources are applied.
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nervi
        app.kubernetes.io/component: stream-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: stream-init
          image: natsio/nats-box:0.14.5
          command:
            - sh
            - -c
            - |
              set -eu
              NATS_URL="nats://nervi-nats.occitan-system.svc.cluster.local:4222"
              # Wait for NATS to be ready
              until nats --server "$NATS_URL" server ping 2>/dev/null; do
                echo "waiting for NATS..."
                sleep 2
              done
              # Create OPS stream (idempotent — succeeds even if already exists)
              nats --server "$NATS_URL" stream add OPS \
                --subjects "ops.>" \
                --storage file \
                --retention limits \
                --max-msgs 10000 \
                --max-age 24h \
                --replicas 1 \
                --discard old \
                --defaults 2>/dev/null || \
              nats --server "$NATS_URL" stream info OPS
              echo "OPS stream ready"
